<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum Dinâmico - Overflowia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forum.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        
        <aside class="side-panel">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-brain"></i></div>
                <h2>Overflowia.AI</h2>
            </div>
            
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn secondary-btn"><i class="fas fa-robot"></i> Chat com IA</a>
                <button class="nav-btn primary-btn"><i class="fas fa-users"></i> Fórum de Postagem</button>
            </div>

            <!-- Area Injetada RAG Base Lateral -->
            <div id="sidebar-auth-wrapper"></div>
        </aside>

        <main class="chat-container">
            
            <header class="forum-header">
                <div>
                    <h1>Todas as Perguntas da Base Local</h1>
                    <p class="subtitle">Alimentando comunidade e Database Interno de AI</p>
                </div>
                <!-- Action do Novo Id Para Validar Clique -->
                <a href="#" id="ask-button" class="ask-btn">Submeter Nova Pergunta RAG</a>
            </header>

            <div class="forum-filters">
                <button class="active">Mais recentes DB</button>
                <button>Relevantes Comunidade</button>
                <button><i class="fas fa-check-circle text-green"></i> Sucesso de IA RAG Resolvida</button>
            </div>

            <!-- Recebe Render Mapped Dinamico Via DOM/JS  -->
            <div class="forum-feed" id="forum-feed-container"></div>
            
        </main>
    </div>
    <script src="forum.js"></script>
</body>
</html>
