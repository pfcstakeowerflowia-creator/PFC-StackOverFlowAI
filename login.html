<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Overflowia AI</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <!-- Efeito de Luz Fundo -->
    <div class="ambient-glow"></div>
    
    <div class="login-wrapper">
        <div class="login-box">
            
            <!-- Logotipo e Título -->
            <div class="login-brand">
                <div class="brand-icon-lg"><i class="fas fa-brain"></i></div>
                <h2>Acesse sua Conta</h2>
            </div>

            <div class="login-header">
                <h3>Bem-vindo ao Overflowia.AI</h3>
                <p style="font-size: 13px; color: var(--text-secondary); margin-top: 5px;">Entre com seus dados para continuar no fórum</p>
            </div>

            <!-- Formulário -->
            <form action="index.html" class="login-form">
                
                <!-- Email -->
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="email" placeholder="aluno@instituicao.edu.br" required>
                    </div>
                </div>

                <!-- Senha -->
                <div class="input-group">
                    <div class="label-row" style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="password">Senha</label>
                        <a href="#" style="font-size: 12px; color: var(--accent-color); text-decoration: none;">Esqueceu a senha?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" class="btn-login" style="margin-top: 15px;"> 
                    Entrar <i class="fas fa-arrow-right"></i>
                </button>
                
            </form>

        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
